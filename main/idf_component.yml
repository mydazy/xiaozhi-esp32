## IDF Component Manager Manifest File
##
## 仅声明本仓库（mydazy-p30-4g / mydazy-p30-wifi / mydazy-p31）真正使用的组件。
## 历史上从 xiaozhi-esp32 上游继承的多 SKU 屏幕/触摸/IO-Expander/相机/视频/USB-RNDIS
## 等远程依赖均已剔除——本仓库不会引入这些 board，组件留着只会拖累 component manager
## 解析、占编译时长和 managed_components 磁盘空间。
##
## 如果未来要新加一块 board 用到新驱动，请在此处显式重新声明。

dependencies:
  # ── LCD 面板（本仓库仅用 JD9853 SPI 屏） ─────────────────────
  mydazy/esp_lcd_jd9853: ^2.0.0

  # ── 触摸 IC（AXS5106L）：本地 fork 在 components/esp_lcd_touch_axs5106l/
  # 在 v2.0.0 基础上增加 4G RF 抗扰增强（POST_RELEASE_GUARD + bus recovery 清状态）。
  # 待乐鑫组件库发布 v2.1.0 后可恢复以下声明：
  # mydazy/esp_lcd_touch_axs5106l:
  #   version: ^2.1.0
  #   rules:
  #     - if: target in [esp32s3]

  # ── 传感器（SC7A20H 三轴加速度计：拾取唤醒 / 运动检测） ─────
  mydazy/esp_sc7a20h: ^2.0.0

  # ── 音频链路 ────────────────────────────────────────────────
  espressif/esp_codec_dev: ~1.5.6           # box_audio_codec / es7111_audio_codec
  espressif/esp_audio_codec: ~2.4.1         # opus enc/dec（audio_service.h）
  espressif/esp_audio_effects: ~1.2.1       # esp_ae_rate_cvt 重采样
  espressif/esp-sr: ~2.3.0                  # AFE 唤醒词 + 降噪

  # ── 网络 / 4G modem ─────────────────────────────────────────
  78/esp-ml307: ~3.6.5                      # P30-4G / P31 双网络板
  # 小智自维护 main/wifi/ 已替代 78/esp-wifi-connect

  # ── UI / LVGL ───────────────────────────────────────────────
  lvgl/lvgl: ~9.5.0
  esp_lvgl_port: ~2.7.2
  78/xiaozhi-fonts: ~1.6.0                  # font_puhui_basic / font_awesome
  espressif/esp_mmap_assets: ^1.3.2         # assets 分区运行时映射
  espressif2022/esp_emote_expression: ^0.1.0  # CONFIG_USE_EMOTE_MESSAGE_STYLE

  # ── 图像 / JPEG 处理（LvglDisplay::SnapshotToJpeg → MCP 截图工具） ──
  espressif/esp_image_effects:
    version: ^1.0.1
    rules:
      - if: target not in [esp32]           # esp_imgfx_color_convert (RGB565↔RGB888)

  # ── 输入设备（按键） ────────────────────────────────────────
  espressif/button: ~4.1.5                  # iot_button (boards/common/button.cc)

  # ── LED ─────────────────────────────────────────────────────
  espressif/led_strip: ~3.0.2               # led/single_led.cc / circular_strip.cc

  # ── Required IDF version ────────────────────────────────────
  idf:
    version: '>=5.5.2'
